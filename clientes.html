<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes — ClientesHumanIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config = { darkMode: "class" };</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen">

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col"></aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header id="topbar" class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4"></header>

      <main class="flex-1 overflow-y-auto p-6">

        <!-- Acciones -->
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 mb-4">
          <div class="flex flex-col md:flex-row gap-3 md:items-center">
            <div class="flex-1 relative">
              <i data-lucide="search" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
              <input id="buscador" type="text" placeholder="Buscar por nombre, empresa, email..." class="input-base pl-10">
            </div>
            <select id="filtro-estado" class="input-base md:w-40">
              <option value="">Todos los estados</option>
              <option>Activo</option>
              <option>Inactivo</option>
              <option>Pendiente</option>
            </select>
            <button id="btn-exportar" class="px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-2 justify-center">
              <i data-lucide="download" class="w-4 h-4"></i> Exportar
            </button>
            <button id="btn-nuevo" class="btn-gradient px-4 py-2.5 rounded-lg font-semibold flex items-center gap-2 justify-center">
              <i data-lucide="plus" class="w-4 h-4"></i> Nuevo cliente
            </button>
          </div>
        </div>

        <!-- Tabla -->
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
                <tr>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Cliente</th>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Empresa</th>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Contacto</th>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Ciudad</th>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Monto</th>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Estado</th>
                  <th class="text-right text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase tracking-wider px-6 py-3">Acciones</th>
                </tr>
              </thead>
              <tbody id="tabla-clientes" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
            </table>
          </div>
          <div id="paginacion" class="px-6 py-3 border-t border-slate-200 dark:border-slate-700 flex items-center justify-between text-sm text-slate-600 dark:text-slate-400"></div>
        </div>

      </main>
    </div>
  </div>

  <!-- Modal formulario -->
  <div id="modal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 rounded-xl max-w-2xl w-full shadow-2xl max-h-[90vh] overflow-y-auto">
      <div class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
        <h3 id="modal-titulo" class="text-lg font-semibold text-slate-900 dark:text-white">Nuevo cliente</h3>
        <button id="cerrar-modal" class="text-slate-400 hover:text-slate-600">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="form-cliente" class="p-6 space-y-4">
        <input type="hidden" id="cliente-id">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nombre completo *</label>
            <input id="cliente-nombre" type="text" required class="input-base">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Empresa</label>
            <input id="cliente-empresa" type="text" class="input-base">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email *</label>
            <input id="cliente-email" type="email" required class="input-base">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Telefono</label>
            <input id="cliente-telefono" type="text" class="input-base">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Ciudad</label>
            <input id="cliente-ciudad" type="text" class="input-base">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Monto (S/)</label>
            <input id="cliente-monto" type="number" step="0.01" class="input-base">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Estado</label>
            <select id="cliente-estado" class="input-base">
              <option>Activo</option>
              <option>Inactivo</option>
              <option>Pendiente</option>
            </select>
          </div>
        </div>
        <div class="flex justify-end gap-2 pt-4 border-t border-slate-200 dark:border-slate-700">
          <button type="button" id="btn-cancelar-modal" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Cancelar</button>
          <button type="submit" class="btn-gradient px-4 py-2 rounded-lg font-semibold">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/clientes.js"></script>
</body>
</html>
