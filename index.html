<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Frutale - Iniciar sesión</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-box p-5 rounded shadow fade-in">
            <div class="text-center mb-4">
                <img src="assets/img/logofrutale.png" alt="Frutale Logo" class="logo-img">
                <h4 class="text-success mt-2">Sistema de Gestión</h4>
            </div>
            <div class="alert alert-info text-center" role="alert">
                <small><i class="fas fa-info-circle"></i> Usuario: admin | Contraseña: 12345678</small>
            </div>
            
            <!-- Alerta de error de autenticación (oculta por defecto) -->
            <div id="error-login" class="alert alert-danger text-center" role="alert" style="display:none">
                <small><i class="fas fa-exclamation-triangle"></i> Usuario o contraseña incorrectos</small>
            </div>
            <form action="api/auth/login.php" method="POST">
                <div class="mb-3">
                    <label for="usuario" class="form-label"><i class="fas fa-user me-2"></i>USUARIO</label>
                    <input type="text" class="form-control form-control-custom" id="usuario" name="username" placeholder="Ingresar usuario" required>
                </div>
                <div class="mb-3">
                    <label for="contraseña" class="form-label"><i class="fas fa-lock me-2"></i>CONTRASEÑA</label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-custom" id="contraseña" name="password" placeholder="Ingresar contraseña" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="mantenerSesion" name="mantenerSesion">
                    <label class="form-check-label" for="mantenerSesion">
                        <small>MANTENER SESIÓN INICIADA</small>
                    </label>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary-custom"><i class="fas fa-sign-in-alt me-2"></i>INICIAR SESIÓN</button>
                </div>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted small">Frutale © 2025 - Gestión de pedidos y distribución</p>
            </div>
        </div>
    </div>

    <script>
        // Toggle para mostrar/ocultar contraseña
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('contraseña');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiar ícono
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });
        
        // Mostrar mensaje de error si existe en la URL
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        };
        
        // Si hay un error en la URL, mostrar el mensaje
        if (getUrlParameter('error') === '1') {
            document.getElementById('error-login').style.display = 'block';
        }
    </script>
</body>
</html>
