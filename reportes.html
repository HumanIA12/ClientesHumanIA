<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reportes — ClientesHumanIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config = { darkMode: "class" };</script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 min-h-screen">

  <div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="w-64 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 flex flex-col"></aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <header id="topbar" class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4"></header>

      <main class="flex-1 overflow-y-auto p-6">

        <!-- Filtros -->
        <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700 mb-4 no-print">
          <div class="flex flex-col md:flex-row gap-3 md:items-center justify-between">
            <h3 class="font-semibold text-slate-900 dark:text-white flex items-center gap-2">
              <i data-lucide="filter" class="w-5 h-5"></i> Reportes y analisis
            </h3>
            <div class="flex gap-2">
              <button onclick="window.print()" class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 flex items-center gap-2">
                <i data-lucide="printer" class="w-4 h-4"></i> Imprimir
              </button>
              <button id="btn-exportar-todo" class="btn-gradient px-4 py-2 rounded-lg font-semibold flex items-center gap-2">
                <i data-lucide="file-down" class="w-4 h-4"></i> Exportar CSV
              </button>
            </div>
          </div>
        </div>

        <!-- Resumen estadistico -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Total clientes</p>
            <p id="r-total" class="text-2xl font-bold text-slate-900 dark:text-white mt-1">0</p>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Ingresos</p>
            <p id="r-ingresos" class="text-2xl font-bold text-emerald-600 mt-1">S/ 0</p>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Promedio</p>
            <p id="r-promedio" class="text-2xl font-bold text-indigo-600 mt-1">S/ 0</p>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl p-4 border border-slate-200 dark:border-slate-700">
            <p class="text-xs text-slate-500 dark:text-slate-400 uppercase font-semibold">Ciudades</p>
            <p id="r-ciudades" class="text-2xl font-bold text-cyan-600 mt-1">0</p>
          </div>
        </div>

        <!-- Graficos -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
          <div class="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
            <h3 class="font-semibold text-slate-900 dark:text-white mb-4">Ingresos por estado</h3>
            <canvas id="g-estado" height="180"></canvas>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
            <h3 class="font-semibold text-slate-900 dark:text-white mb-4">Top 5 clientes por monto</h3>
            <div id="top-clientes" class="space-y-3"></div>
          </div>
        </div>

        <!-- Resumen por ciudad -->
        <div class="bg-white dark:bg-slate-800 rounded-xl p-5 border border-slate-200 dark:border-slate-700">
          <h3 class="font-semibold text-slate-900 dark:text-white mb-4">Resumen por ciudad</h3>
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="border-b border-slate-200 dark:border-slate-700">
                <tr>
                  <th class="text-left text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase px-4 py-2">Ciudad</th>
                  <th class="text-right text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase px-4 py-2">Clientes</th>
                  <th class="text-right text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase px-4 py-2">Activos</th>
                  <th class="text-right text-xs font-semibold text-slate-600 dark:text-slate-400 uppercase px-4 py-2">Monto total</th>
                </tr>
              </thead>
              <tbody id="tabla-ciudades" class="divide-y divide-slate-100 dark:divide-slate-700"></tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/reportes.js"></script>
</body>
</html>
