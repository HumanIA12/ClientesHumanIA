<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DINET · Acceso al sistema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="css/style.css">
  <script>tailwind.config = { darkMode: "class" };</script>
</head>
<body class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center p-4">

  <!-- Banda decorativa superior -->
  <div class="fixed top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-rose-500 via-amber-500 via-emerald-500 to-sky-500 z-20"></div>

  <!-- Decoracion -->
  <div class="absolute inset-0 overflow-hidden -z-10 pointer-events-none">
    <div class="absolute top-1/4 -left-20 w-96 h-96 bg-blue-300/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-emerald-300/20 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md animate-slide-up">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-8">

      <!-- Logo -->
      <div class="text-center mb-6">
        <div class="inline-flex w-14 h-14 rounded-xl bg-slate-900 dark:bg-slate-700 items-center justify-center text-white text-2xl font-bold mb-3 shadow-lg">
          D
        </div>
        <h1 class="text-2xl font-bold text-slate-900 dark:text-white" data-app-nombre>DINET</h1>
        <p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5" data-app-subtitulo>Estatus Picking Unilever</p>
      </div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Usuario</label>
          <div class="relative">
            <i data-lucide="user" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="usuario" class="input-base pl-10" placeholder="admin" required autofocus>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Contraseña</label>
          <div class="relative">
            <i data-lucide="lock" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="password" id="password" class="input-base pl-10 pr-10" placeholder="••••••••" required>
            <button type="button" id="toggle-pass" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-gradient w-full py-2.5 rounded-lg font-semibold flex items-center justify-center gap-2">
          <i data-lucide="log-in" class="w-5 h-5"></i>
          Ingresar al sistema
        </button>
      </form>

      <div class="mt-6 p-3 bg-slate-50 dark:bg-slate-900/50 rounded-lg border border-slate-200 dark:border-slate-700">
        <p class="text-xs font-semibold text-slate-700 dark:text-slate-300 mb-2 flex items-center gap-1">
          <i data-lucide="key" class="w-3.5 h-3.5"></i> Credenciales de prueba
        </p>
        <div class="text-xs text-slate-600 dark:text-slate-400 space-y-1 font-mono">
          <div>admin · admin123</div>
          <div>operador · operador123</div>
        </div>
      </div>

      <p class="text-center text-xs text-slate-400 mt-6">
        © <span data-app-anio>2025</span> <span data-app-empresa>DINET S.A</span> · <span data-app-version>v</span>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script>
    if (DataStore.getSesion()) window.location.href = "dashboard.html";

    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();

      const togglePass = document.getElementById("toggle-pass");
      const passInput = document.getElementById("password");
      togglePass.onclick = () => {
        const isPass = passInput.type === "password";
        passInput.type = isPass ? "text" : "password";
        togglePass.innerHTML = `<i data-lucide="${isPass ? 'eye-off' : 'eye'}" class="w-5 h-5"></i>`;
        lucide.createIcons();
      };

      document.getElementById("form-login").onsubmit = (e) => {
        e.preventDefault();
        const u = document.getElementById("usuario").value.trim();
        const p = document.getElementById("password").value;
        const r = Auth.login(u, p);
        if (r.ok) {
          Utils.toast("Bienvenido, " + r.usuario.nombre, "success");
          setTimeout(() => window.location.href = "dashboard.html", 600);
        } else {
          Utils.toast(r.mensaje, "error");
        }
      };
    });
  </script>
</body>
</html>
